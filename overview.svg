<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 200" width="100%" height="100%" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, 'Apple Color Emoji', Arial, sans-serif, 'Segoe UI Emoji', 'Segoe UI Symbol'; background: #ffffff;">
  <defs>
    <style>
      .animate-node {
        opacity: 0;
        animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      @keyframes slideUp {
        0% { opacity: 0; transform: translateY(15px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      .delay-1 { animation-delay: 0.15s; }
      .delay-2 { animation-delay: 0.35s; }
      .delay-3 { animation-delay: 0.55s; }
      .interactive-rect {
        transition: stroke 0.2s ease, fill 0.2s ease;
      }
      .node-group:hover .interactive-rect {
        stroke: #9ca3af;
        fill: #f9fafb;
        cursor: default;
      }
      .core-pulse {
        animation: pulseCore 4s ease-in-out infinite;
      }
      @keyframes pulseCore {
        0% { stroke: #d1d5db; }
        50% { stroke: #6b7280; }
        100% { stroke: #d1d5db; }
      }
    </style>
  </defs>

  <!-- Outer container: HPD AI Framework -->
  <g class="animate-node" style="animation-delay: 0s;">
    <rect class="core-pulse" x="20" y="15" width="1010" height="170" rx="10" fill="none" stroke="#d1d5db" stroke-width="2" />
    <text x="525" y="45" fill="#37352f" font-size="20" font-weight="600" text-anchor="middle">HPD AI Framework</text>
  </g>

  <!-- HPD-Agent -->
  <g transform="translate(50, 65)">
    <g class="animate-node delay-1 node-group">
      <rect class="interactive-rect" width="280" height="100" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" />
      <text x="140" y="32" fill="#37352f" font-size="16" font-weight="600" text-anchor="middle">HPD-Agent</text>
      <text x="140" y="52" fill="#787774" font-size="11" text-anchor="middle">Agents · Tools · Middleware</text>
      <text x="140" y="66" fill="#787774" font-size="11" text-anchor="middle">Multi-Agent · Sessions · Audio</text>
      <text x="140" y="80" fill="#787774" font-size="11" text-anchor="middle">Evaluation · Streaming · Observability</text>
    </g>
  </g>

  <!-- HPD-RAG -->
  <g transform="translate(370, 65)">
    <g class="animate-node delay-2 node-group">
      <rect class="interactive-rect" width="280" height="100" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" />
      <text x="140" y="32" fill="#37352f" font-size="16" font-weight="600" text-anchor="middle">HPD-RAG</text>
      <text x="140" y="52" fill="#787774" font-size="11" text-anchor="middle">Ingestion · Retrieval · Evaluation</text>
      <text x="140" y="66" fill="#787774" font-size="11" text-anchor="middle">Modular Pipelines · Vector &amp; Graph</text>
      <text x="140" y="80" fill="#787774" font-size="11" text-anchor="middle">Reranking · Filtering · Scoring</text>
    </g>
  </g>

  <!-- HPD-ML -->
  <g transform="translate(690, 65)">
    <g class="animate-node delay-3 node-group">
      <rect class="interactive-rect" width="280" height="100" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" />
      <text x="140" y="32" fill="#37352f" font-size="16" font-weight="600" text-anchor="middle">HPD-ML</text>
      <text x="140" y="52" fill="#787774" font-size="11" text-anchor="middle">Data · Transforms · Learners</text>
      <text x="140" y="66" fill="#787774" font-size="11" text-anchor="middle">Classification · Regression · Clustering</text>
      <text x="140" y="80" fill="#787774" font-size="11" text-anchor="middle">Time Series · Evaluation · Serialization</text>
    </g>
  </g>
</svg>
