<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 380" width="100%" height="100%" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, 'Apple Color Emoji', Arial, sans-serif, 'Segoe UI Emoji', 'Segoe UI Symbol'; background: #ffffff;">
  <defs>
    <style>
      .animate-node {
        opacity: 0;
        animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      @keyframes slideUp {
        0% { opacity: 0; transform: translateY(15px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      .delay-1 { animation-delay: 0.15s; }
      .delay-2 { animation-delay: 0.35s; }
      .delay-3 { animation-delay: 0.55s; }
      .delay-4 { animation-delay: 0.75s; }
      .interactive-rect {
        transition: stroke 0.2s ease, fill 0.2s ease;
      }
      .node-group:hover .interactive-rect {
        stroke: #9ca3af;
        fill: #f9fafb;
        cursor: default;
      }
      .core-pulse {
        animation: pulseCore 4s ease-in-out infinite;
      }
      @keyframes pulseCore {
        0% { stroke: #d1d5db; }
        50% { stroke: #6b7280; }
        100% { stroke: #d1d5db; }
      }
    </style>
  </defs>

  <!-- Outer container -->
  <g class="animate-node" style="animation-delay: 0s;">
    <rect class="core-pulse" x="20" y="15" width="620" height="350" rx="10" fill="none" stroke="#d1d5db" stroke-width="2" />
    <text x="330" y="48" fill="#37352f" font-size="20" font-weight="600" text-anchor="middle">HPD AI Framework</text>
  </g>

  <!-- HPD-Agent (top-left) -->
  <g transform="translate(50, 70)">
    <g class="animate-node delay-1 node-group">
      <rect class="interactive-rect" width="260" height="110" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" />
      <text x="130" y="32" fill="#37352f" font-size="16" font-weight="600" text-anchor="middle">HPD-Agent</text>
      <text x="130" y="52" fill="#787774" font-size="11" text-anchor="middle">Agents · Tools · Middleware</text>
      <text x="130" y="67" fill="#787774" font-size="11" text-anchor="middle">Multi-Agent · Sessions · Audio</text>
      <text x="130" y="82" fill="#787774" font-size="11" text-anchor="middle">Evaluation · Streaming · Observability</text>
    </g>
  </g>

  <!-- HPD-RAG (top-right) -->
  <g transform="translate(350, 70)">
    <g class="animate-node delay-2 node-group">
      <rect class="interactive-rect" width="260" height="110" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" />
      <text x="130" y="32" fill="#37352f" font-size="16" font-weight="600" text-anchor="middle">HPD-RAG</text>
      <text x="130" y="52" fill="#787774" font-size="11" text-anchor="middle">Ingestion · Retrieval · Evaluation</text>
      <text x="130" y="67" fill="#787774" font-size="11" text-anchor="middle">Modular Pipelines · Vector &amp; Graph</text>
      <text x="130" y="82" fill="#787774" font-size="11" text-anchor="middle">Reranking · Filtering · Scoring</text>
    </g>
  </g>

  <!-- HPD-ML (bottom-left) -->
  <g transform="translate(50, 220)">
    <g class="animate-node delay-3 node-group">
      <rect class="interactive-rect" width="260" height="110" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" />
      <text x="130" y="32" fill="#37352f" font-size="16" font-weight="600" text-anchor="middle">HPD-ML</text>
      <text x="130" y="52" fill="#787774" font-size="11" text-anchor="middle">Data · Transforms · Learners</text>
      <text x="130" y="67" fill="#787774" font-size="11" text-anchor="middle">Classification · Regression · Clustering</text>
      <text x="130" y="82" fill="#787774" font-size="11" text-anchor="middle">Time Series · Evaluation · Serialization</text>
    </g>
  </g>

  <!-- HPD-Auth (bottom-right) -->
  <g transform="translate(350, 220)">
    <g class="animate-node delay-4 node-group">
      <rect class="interactive-rect" width="260" height="110" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" />
      <text x="130" y="32" fill="#37352f" font-size="16" font-weight="600" text-anchor="middle">HPD-Auth</text>
      <text x="130" y="52" fill="#787774" font-size="11" text-anchor="middle">JWT · Sessions · Multi-Tenancy</text>
      <text x="130" y="67" fill="#787774" font-size="11" text-anchor="middle">2FA · Passkeys · OAuth · Admin</text>
      <text x="130" y="82" fill="#787774" font-size="11" text-anchor="middle">Audit Log · Events · Authorization</text>
    </g>
  </g>
</svg>
