<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 860" width="100%" height="100%" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, 'Apple Color Emoji', Arial, sans-serif, 'Segoe UI Emoji', 'Segoe UI Symbol'; background: #ffffff;">
  <defs>
    <marker id="arrow-minimal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d1d5db" />
    </marker>
    <style>
      .animate-node {
        opacity: 0;
        animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      @keyframes slideUp {
        0% { opacity: 0; transform: translateY(15px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      .delay-1 { animation-delay: 0.1s; }
      .delay-2 { animation-delay: 0.25s; }
      .delay-3 { animation-delay: 0.4s; }
      .delay-4 { animation-delay: 0.55s; }
      .delay-5 { animation-delay: 0.7s; }
      .delay-6 { animation-delay: 0.85s; }
      .flow-line {
        stroke-dasharray: 6 6;
        opacity: 0;
        animation: flow 1.5s linear infinite, fadeIn 0.5s ease-out 0.8s forwards;
      }
      .flow-dash-4 {
        stroke-dasharray: 4 4;
        opacity: 0;
        animation: flow-4 1s linear infinite, fadeIn 0.5s ease-out 0.8s forwards;
      }
      .flow-state {
        stroke-dasharray: 3 5;
        opacity: 0;
        animation: flow-state 2s linear infinite, fadeIn 0.5s ease-out 0.8s forwards;
      }
      @keyframes flow {
        to { stroke-dashoffset: -12; }
      }
      @keyframes flow-4 {
        to { stroke-dashoffset: -8; }
      }
      @keyframes flow-state {
        to { stroke-dashoffset: -16; }
      }
      @keyframes fadeIn {
        to { opacity: 1; }
      }
      .interactive-rect {
        transition: stroke 0.2s ease, fill 0.2s ease;
      }
      .node-group:hover .interactive-rect {
        stroke: #9ca3af;
        fill: #f9fafb;
        cursor: default;
      }
      .core-pulse {
        animation: pulseCore 4s ease-in-out infinite;
      }
      @keyframes pulseCore {
        0% { stroke: #d1d5db; }
        50% { stroke: #6b7280; }
        100% { stroke: #d1d5db; }
      }
    </style>
  </defs>

  <!-- Title -->
  <g class="animate-node" style="animation-delay: 0s;">
    <text x="50" y="60" fill="#37352f" font-size="24" font-weight="600" letter-spacing="-0.5">HPD-Auth Architecture</text>
    <text x="50" y="90" fill="#787774" font-size="14">Request, Auth, and Event Flow</text>
  </g>

  <g>
    <!-- ═══════════════════════════════════════════════ -->
    <!-- CONNECTIONS                                     -->
    <!-- ═══════════════════════════════════════════════ -->

    <!-- Clients -> Your App -->
    <path d="M 180 240 L 230 240" class="flow-line" fill="none" stroke="#d1d5db" stroke-width="2" marker-end="url(#arrow-minimal)" />
    <path d="M 180 295 L 230 295" class="flow-line" fill="none" stroke="#d1d5db" stroke-width="2" marker-end="url(#arrow-minimal)" />
    <path d="M 180 350 L 230 350" class="flow-line" fill="none" stroke="#d1d5db" stroke-width="2" marker-end="url(#arrow-minimal)" />

    <!-- Your App -> HPD.Auth Core -->
    <path d="M 480 310 L 530 310" class="flow-line" fill="none" stroke="#d1d5db" stroke-width="2" marker-end="url(#arrow-minimal)" />
    <path d="M 540 340 L 490 340" class="flow-line" fill="none" stroke="#d1d5db" stroke-width="2" marker-end="url(#arrow-minimal)" />

    <!-- Core -> ASP.NET Identity -->
    <path d="M 560 570 L 560 620" class="flow-line" fill="none" stroke="#d1d5db" stroke-width="2" marker-end="url(#arrow-minimal)" />
    <path d="M 590 625 L 590 575" class="flow-line" fill="none" stroke="#d1d5db" stroke-width="2" marker-end="url(#arrow-minimal)" />

    <!-- Core -> ISessionStore -->
    <path d="M 680 490 L 740 490" class="flow-state" fill="none" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow-minimal)" />

    <!-- Core -> Event Bus -->
    <path d="M 680 380 L 740 380" class="flow-dash-4" fill="none" stroke="#d1d5db" stroke-width="2" marker-end="url(#arrow-minimal)" />

    <!-- Event Bus -> Your Handlers -->
    <path d="M 940 340 L 990 340" class="flow-line" fill="none" stroke="#d1d5db" stroke-width="2" marker-end="url(#arrow-minimal)" />
    <path d="M 940 380 L 990 410" class="flow-line" fill="none" stroke="#d1d5db" stroke-width="2" marker-end="url(#arrow-minimal)" />
    <path d="M 940 420 L 990 480" class="flow-line" fill="none" stroke="#d1d5db" stroke-width="2" marker-end="url(#arrow-minimal)" />

    <!-- Core -> Senders -->
    <path d="M 560 210 L 560 160" class="flow-dash-4" fill="none" stroke="#d1d5db" stroke-width="2" marker-end="url(#arrow-minimal)" />

    <!-- Extension packages -> Core -->
    <path d="M 320 560 L 530 500" class="flow-state" fill="none" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow-minimal)" />

    <!-- Line labels -->
    <g class="animate-node delay-6">
      <text x="695" y="470" fill="#9ca3af" font-size="11" text-anchor="start">sessions · devices</text>
      <text x="695" y="360" fill="#787774" font-size="12" text-anchor="start">IAuthEvent</text>
      <text x="570" y="185" fill="#787774" font-size="12" text-anchor="start">email · sms</text>
      <text x="420" y="548" fill="#9ca3af" font-size="11" text-anchor="middle">extends</text>
    </g>

    <!-- ═══════════════════════════════════════════════ -->
    <!-- NODES                                           -->
    <!-- ═══════════════════════════════════════════════ -->

    <!-- Clients -->
    <g transform="translate(40, 200)">
      <g class="animate-node delay-1 node-group">
        <rect class="interactive-rect" width="140" height="190" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5" />
        <text x="70" y="30" fill="#37352f" font-size="14" font-weight="600" text-anchor="middle">Clients</text>
        <rect x="10" y="45" width="120" height="28" rx="4" fill="#f7f7f5" stroke="#e5e7eb" stroke-width="1" />
        <text x="70" y="63" fill="#37352f" font-size="12" text-anchor="middle">Browser / SPA</text>
        <rect x="10" y="79" width="120" height="28" rx="4" fill="#f7f7f5" stroke="#e5e7eb" stroke-width="1" />
        <text x="70" y="97" fill="#37352f" font-size="12" text-anchor="middle">Mobile App</text>
        <rect x="10" y="113" width="120" height="28" rx="4" fill="#f7f7f5" stroke="#e5e7eb" stroke-width="1" />
        <text x="70" y="131" fill="#37352f" font-size="12" text-anchor="middle">API Client</text>
        <text x="70" y="165" fill="#787774" font-size="11" text-anchor="middle">Bearer / Cookie</text>
        <text x="70" y="180" fill="#787774" font-size="11" text-anchor="middle">dual-scheme auth</text>
      </g>
    </g>

    <!-- Your ASP.NET App -->
    <g transform="translate(230, 210)">
      <g class="animate-node delay-2 node-group">
        <rect class="interactive-rect" width="250" height="220" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5" />
        <text x="125" y="35" fill="#37352f" font-size="14" font-weight="600" text-anchor="middle">Your ASP.NET App</text>

        <rect x="15" y="50" width="220" height="28" rx="4" fill="#f7f7f5" stroke="#e5e7eb" stroke-width="1" />
        <text x="125" y="68" fill="#37352f" font-size="12" text-anchor="middle">AddHPDAuth()</text>

        <rect x="15" y="84" width="220" height="28" rx="4" fill="#f7f7f5" stroke="#e5e7eb" stroke-width="1" />
        <text x="125" y="102" fill="#37352f" font-size="12" text-anchor="middle">MapHPDAuthEndpoints()</text>

        <rect x="15" y="118" width="220" height="28" rx="4" fill="#f7f7f5" stroke="#e5e7eb" stroke-width="1" />
        <text x="125" y="136" fill="#37352f" font-size="12" text-anchor="middle">MapHPDAdminEndpoints()</text>

        <rect x="15" y="152" width="220" height="28" rx="4" fill="#f7f7f5" stroke="#e5e7eb" stroke-width="1" />
        <text x="125" y="170" fill="#37352f" font-size="12" text-anchor="middle">MapHPD2FAEndpoints()</text>

        <text x="125" y="205" fill="#787774" font-size="11" text-anchor="middle">/api/auth/* · /api/admin/* · /api/2fa/*</text>
      </g>
    </g>

    <!-- HPD.Auth Core -->
    <g transform="translate(530, 200)">
      <g class="animate-node delay-3 node-group">
        <rect class="interactive-rect core-pulse" width="150" height="390" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="2" />
        <text x="75" y="35" fill="#37352f" font-size="15" font-weight="600" text-anchor="middle">HPD.Auth</text>
        <text x="75" y="52" fill="#787774" font-size="12" text-anchor="middle">Core</text>

        <rect x="15" y="68" width="120" height="28" rx="4" fill="#f7f7f5" stroke="#e5e7eb" stroke-width="1" />
        <text x="75" y="86" fill="#37352f" font-size="12" text-anchor="middle">Auth Service</text>

        <rect x="15" y="102" width="120" height="28" rx="4" fill="#f7f7f5" stroke="#e5e7eb" stroke-width="1" />
        <text x="75" y="120" fill="#37352f" font-size="12" text-anchor="middle">Session Manager</text>

        <rect x="15" y="136" width="120" height="28" rx="4" fill="#f7f7f5" stroke="#e5e7eb" stroke-width="1" />
        <text x="75" y="154" fill="#37352f" font-size="12" text-anchor="middle">Token Service</text>

        <rect x="15" y="170" width="120" height="28" rx="4" fill="#f7f7f5" stroke="#e5e7eb" stroke-width="1" />
        <text x="75" y="188" fill="#37352f" font-size="12" text-anchor="middle">User Manager</text>

        <rect x="15" y="204" width="120" height="28" rx="4" fill="#f7f7f5" stroke="#e5e7eb" stroke-width="1" />
        <text x="75" y="222" fill="#37352f" font-size="12" text-anchor="middle">Audit Log</text>

        <rect x="15" y="238" width="120" height="28" rx="4" fill="#f7f7f5" stroke="#e5e7eb" stroke-width="1" />
        <text x="75" y="256" fill="#37352f" font-size="12" text-anchor="middle">Policy Scheme</text>

        <rect x="15" y="272" width="120" height="28" rx="4" fill="#f7f7f5" stroke="#e5e7eb" stroke-width="1" />
        <text x="75" y="290" fill="#37352f" font-size="12" text-anchor="middle">Multi-Tenancy</text>

        <rect x="15" y="340" width="120" height="28" rx="4" fill="#f7f7f5" stroke="#e5e7eb" stroke-width="1" />
        <text x="75" y="353" fill="#787774" font-size="10" text-anchor="middle">IAuthEventHandler</text>
        <text x="75" y="366" fill="#37352f" font-size="11" font-weight="600" text-anchor="middle">Event Bus</text>
      </g>
    </g>

    <!-- Senders -->
    <g transform="translate(440, 80)">
      <g class="animate-node delay-4 node-group">
        <rect class="interactive-rect" width="270" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5" />
        <text x="135" y="28" fill="#37352f" font-size="14" font-weight="600" text-anchor="middle">Notification Senders</text>
        <rect x="15" y="38" width="110" height="22" rx="4" fill="#f7f7f5" stroke="#e5e7eb" stroke-width="1" />
        <text x="70" y="53" fill="#787774" font-size="11" text-anchor="middle">IAuthEmailSender</text>
        <rect x="145" y="38" width="110" height="22" rx="4" fill="#f7f7f5" stroke="#e5e7eb" stroke-width="1" />
        <text x="200" y="53" fill="#787774" font-size="11" text-anchor="middle">IAuthSmsSender</text>
      </g>
    </g>

    <!-- ASP.NET Identity -->
    <g transform="translate(440, 630)">
      <g class="animate-node delay-4 node-group">
        <rect class="interactive-rect" width="270" height="100" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5" />
        <text x="135" y="30" fill="#37352f" font-size="14" font-weight="600" text-anchor="middle">ASP.NET Identity</text>
        <rect x="15" y="44" width="110" height="22" rx="4" fill="#f7f7f5" stroke="#e5e7eb" stroke-width="1" />
        <text x="70" y="59" fill="#787774" font-size="11" text-anchor="middle">Password Hashing</text>
        <rect x="145" y="44" width="110" height="22" rx="4" fill="#f7f7f5" stroke="#e5e7eb" stroke-width="1" />
        <text x="200" y="59" fill="#787774" font-size="11" text-anchor="middle">Security Stamps</text>
        <rect x="15" y="72" width="110" height="22" rx="4" fill="#f7f7f5" stroke="#e5e7eb" stroke-width="1" />
        <text x="70" y="87" fill="#787774" font-size="11" text-anchor="middle">Lockout</text>
        <rect x="145" y="72" width="110" height="22" rx="4" fill="#f7f7f5" stroke="#e5e7eb" stroke-width="1" />
        <text x="200" y="87" fill="#787774" font-size="11" text-anchor="middle">Token Providers</text>
      </g>
    </g>

    <!-- ISessionStore -->
    <g transform="translate(740, 450)">
      <g class="animate-node delay-4 node-group">
        <rect class="interactive-rect" width="180" height="100" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5" />
        <path d="M 55 22 C 55 17, 125 17, 125 22 C 125 27, 55 27, 55 22 Z" fill="#f7f7f5" stroke="#d1d5db" stroke-width="1.2" />
        <path d="M 55 22 L 55 37 C 55 42, 125 42, 125 37 L 125 22" fill="none" stroke="#d1d5db" stroke-width="1.2" />
        <text x="90" y="60" fill="#37352f" font-size="13" font-weight="600" text-anchor="middle">ISessionStore</text>
        <text x="90" y="78" fill="#787774" font-size="11" text-anchor="middle">Sessions · Devices</text>
        <text x="90" y="92" fill="#787774" font-size="11" text-anchor="middle">Refresh Tokens</text>
      </g>
    </g>

    <!-- Event Bus -> Your Handlers -->
    <g transform="translate(740, 280)">
      <g class="animate-node delay-5 node-group">
        <rect class="interactive-rect" width="200" height="180" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5" />
        <text x="100" y="30" fill="#37352f" font-size="14" font-weight="600" text-anchor="middle">Event Bus</text>
        <text x="100" y="48" fill="#787774" font-size="11" text-anchor="middle">IAuthEventHandler&lt;T&gt;</text>
        <rect x="15" y="58" width="170" height="25" rx="4" fill="#f7f7f5" stroke="#e5e7eb" stroke-width="1" />
        <text x="100" y="74" fill="#37352f" font-size="11" text-anchor="middle">UserRegisteredEvent</text>
        <rect x="15" y="89" width="170" height="25" rx="4" fill="#f7f7f5" stroke="#e5e7eb" stroke-width="1" />
        <text x="100" y="105" fill="#37352f" font-size="11" text-anchor="middle">LoginSucceededEvent</text>
        <rect x="15" y="120" width="170" height="25" rx="4" fill="#f7f7f5" stroke="#e5e7eb" stroke-width="1" />
        <text x="100" y="136" fill="#37352f" font-size="11" text-anchor="middle">LoginFailedEvent</text>
        <rect x="15" y="151" width="170" height="25" rx="4" fill="#f7f7f5" stroke="#e5e7eb" stroke-width="1" />
        <text x="100" y="167" fill="#37352f" font-size="11" text-anchor="middle">SessionRevokedEvent</text>
      </g>
    </g>

    <!-- Your Handlers -->
    <g transform="translate(990, 290)">
      <g class="animate-node delay-6 node-group">
        <rect class="interactive-rect" width="170" height="230" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5" />
        <text x="85" y="30" fill="#37352f" font-size="14" font-weight="600" text-anchor="middle">Your Handlers</text>
        <rect x="15" y="45" width="140" height="28" rx="4" fill="#f7f7f5" stroke="#e5e7eb" stroke-width="1" />
        <text x="85" y="62" fill="#37352f" font-size="12" text-anchor="middle">Webhook</text>
        <rect x="15" y="79" width="140" height="28" rx="4" fill="#f7f7f5" stroke="#e5e7eb" stroke-width="1" />
        <text x="85" y="96" fill="#37352f" font-size="12" text-anchor="middle">Slack Alert</text>
        <rect x="15" y="113" width="140" height="28" rx="4" fill="#f7f7f5" stroke="#e5e7eb" stroke-width="1" />
        <text x="85" y="130" fill="#37352f" font-size="12" text-anchor="middle">SendGrid Email</text>
        <rect x="15" y="147" width="140" height="28" rx="4" fill="#f7f7f5" stroke="#e5e7eb" stroke-width="1" />
        <text x="85" y="164" fill="#37352f" font-size="12" text-anchor="middle">Compliance Log</text>
        <rect x="15" y="181" width="140" height="28" rx="4" fill="#f7f7f5" stroke="#e5e7eb" stroke-width="1" />
        <text x="85" y="198" fill="#787774" font-size="11" text-anchor="middle">anything...</text>
      </g>
    </g>

    <!-- Extension Packages -->
    <g transform="translate(40, 480)">
      <g class="animate-node delay-4 node-group">
        <rect class="interactive-rect" width="280" height="220" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5" />
        <text x="140" y="30" fill="#37352f" font-size="14" font-weight="600" text-anchor="middle">Extension Packages</text>
        <rect x="15" y="45" width="115" height="28" rx="4" fill="#f7f7f5" stroke="#e5e7eb" stroke-width="1" />
        <text x="72" y="63" fill="#37352f" font-size="12" text-anchor="middle">HPD.Auth.2FA</text>
        <rect x="150" y="45" width="115" height="28" rx="4" fill="#f7f7f5" stroke="#e5e7eb" stroke-width="1" />
        <text x="207" y="63" fill="#37352f" font-size="12" text-anchor="middle">HPD.Auth.OAuth</text>
        <rect x="15" y="79" width="115" height="28" rx="4" fill="#f7f7f5" stroke="#e5e7eb" stroke-width="1" />
        <text x="72" y="97" fill="#37352f" font-size="12" text-anchor="middle">HPD.Auth.Passkeys</text>
        <rect x="150" y="79" width="115" height="28" rx="4" fill="#f7f7f5" stroke="#e5e7eb" stroke-width="1" />
        <text x="207" y="97" fill="#37352f" font-size="12" text-anchor="middle">HPD.Auth.Admin</text>
        <rect x="15" y="113" width="115" height="28" rx="4" fill="#f7f7f5" stroke="#e5e7eb" stroke-width="1" />
        <text x="72" y="131" fill="#37352f" font-size="12" text-anchor="middle">HPD.Auth.Audit</text>
        <rect x="150" y="113" width="115" height="28" rx="4" fill="#f7f7f5" stroke="#e5e7eb" stroke-width="1" />
        <text x="207" y="131" fill="#37352f" font-size="12" text-anchor="middle">HPD.Auth.Authz</text>
        <text x="140" y="175" fill="#787774" font-size="11" text-anchor="middle">install only what you need</text>
        <text x="140" y="192" fill="#787774" font-size="11" text-anchor="middle">each is a separate NuGet package</text>
      </g>
    </g>

  </g>
</svg>
